name: DevOps360 CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask gunicorn

    - name: Test app
      run: |
        python -c "from app import app; print('✅ App import successful')"

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t devops360 .

    - name: Test Docker container
      run: |
        docker run -d -p 5000:5000 devops360
        sleep 3
        curl http://localhost:5000

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/devops360
          git pull origin main
          docker stop devops360 || true
          docker rm devops360 || true
          docker build -t devops360 .
          docker run -d -p 5000:5000 --name devops360 devops360
          echo "✅ Deployed successfully!"
